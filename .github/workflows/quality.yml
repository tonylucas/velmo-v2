name: quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      # --extra obs installs langfuse, which two observability tests need: they
      # exercise the export-time masking hook that keeps card numbers out of the
      # traces. A bare `uv sync` leaves them failing on import.
      - name: Install dependencies
        run: uv sync --extra obs

      # The whole suite, not just tests/acceptance/. Running only the acceptance
      # directory left 204 of 230 tests unexecuted in CI — including every test
      # guarding PII masking, deterministic routing and tool-outcome classification.
      # A test that never runs reports no failure, so the gap was invisible.
      - name: Test suite
        run: uv run pytest tests/ -v

      - name: Quality gate
        run: uv run python -m velmo.mlops.score --min-score 0.90
